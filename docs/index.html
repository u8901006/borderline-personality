<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BPD Research Daily &middot; 邊緣型人格障礙研究文獻日報</title>
<style>
  :root { --bg: #f6f1e8; --surface: #fffaf2; --line: #d8c5ab; --text: #2b2118; --muted: #766453; --accent: #8c4f2b; --accent-soft: #ead2bf; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: radial-gradient(circle at top, #fff6ea 0, var(--bg) 55%, #ead8c6 100%); color: var(--text); font-family: "Noto Sans TC", "PingFang TC", "Helvetica Neue", Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { text-align: center; padding: 60px 24px; max-width: 480px; }
  .logo { font-size: 64px; margin-bottom: 24px; }
  h1 { font-size: 24px; color: var(--text); margin-bottom: 12px; }
  .subtitle { color: var(--accent); font-size: 15px; margin-bottom: 32px; line-height: 1.6; }
  .badge { display: inline-block; padding: 6px 16px; background: var(--accent-soft); border: 1px solid var(--line); border-radius: 20px; font-size: 13px; color: var(--accent); margin-bottom: 24px; }
  .link { display: block; padding: 14px 24px; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; color: var(--text); text-decoration: none; margin-bottom: 8px; transition: all 0.2s; }
  .link:hover { background: var(--accent-soft); border-color: var(--accent); transform: translateX(4px); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">🧠</div>
  <h1>BPD Research Daily</h1>
  <p class="subtitle">邊緣型人格障礙研究文獻日報<br/>每日 21:00 自動更新</p>
  <span class="badge">Coming Soon</span>
  <a href="https://www.leepsyclinic.com/" class="link" target="_blank">🏥 李政洋身心診所首頁</a>
  <a href="https://blog.leepsyclinic.com/" class="link" target="_blank">📬 訂閱電子報</a>
</div>
</body>
</html>
